openapi: 3.1.0
info:
  title: Internal Summary Surfaces Contract
  version: 0.1.0
  description: >
    Design-time contract for the shared summary surface introduced by
    006-briefing-weekly-modernization. These endpoints describe internal
    composition boundaries only; they are not a public HTTP commitment.
servers:
  - url: https://internal.invalid
paths:
  /internal/summary-surfaces/briefing:
    post:
      summary: Compose a structured daily briefing and deterministic Telegram output
      operationId: composeBriefingSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BriefingComposeRequest'
      responses:
        '200':
          description: Structured daily briefing plus formatted output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BriefingComposeResponse'
  /internal/summary-surfaces/weekly:
    post:
      summary: Compose a structured weekly review and deterministic Telegram output
      operationId: composeWeeklySummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyComposeRequest'
      responses:
        '200':
          description: Structured weekly review plus formatted output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyComposeResponse'
  /internal/summary-surfaces/daily-close:
    post:
      summary: Compose a structured end-of-day reflection and deterministic Telegram output
      operationId: composeDailyCloseSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DailyCloseComposeRequest'
      responses:
        '200':
          description: Structured end-of-day reflection plus formatted output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyCloseComposeResponse'
components:
  schemas:
    SummaryRequestContext:
      type: object
      required:
        - entry_point
        - delivery_channel
        - scheduling_metadata
        - urgent_mode
        - generated_at_iso
        - tone_policy
      properties:
        entry_point:
          type: string
          enum:
            - manual_command
            - scheduler
        user_id:
          type:
            - string
            - 'null'
        generated_at_iso:
          type: string
          format: date-time
        timezone:
          type:
            - string
            - 'null'
        work_style_mode:
          type: string
          enum:
            - standard
            - focus
            - urgent
        delivery_channel:
          type: string
          enum:
            - telegram
        scheduling_metadata:
          type: object
          required:
            - trigger_kind
          properties:
            trigger_kind:
              type: string
              enum:
                - manual
                - scheduled
            schedule_key:
              type:
                - string
                - 'null'
            scheduled_for_iso:
              type:
                - string
                - 'null'
              format: date-time
            grace_window_minutes:
              type:
                - integer
                - 'null'
        urgent_mode:
          type: boolean
        tone_policy:
          type: string
          enum:
            - preserve_existing
    TaskInput:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type:
            - string
            - 'null'
        project_id:
          type:
            - string
            - 'null'
        project_name:
          type:
            - string
            - 'null'
        priority:
          type:
            - integer
            - 'null'
          enum:
            - 0
            - 1
            - 3
            - 5
            - null
        due_date:
          type:
            - string
            - 'null'
        status:
          type:
            - integer
            - 'null'
    ProcessedHistoryEntry:
      type: object
      required:
        - original_title
      properties:
        task_id:
          type:
            - string
            - 'null'
        original_title:
          type: string
        approved:
          type: boolean
        skipped:
          type: boolean
        dropped:
          type: boolean
        reviewed_at:
          type:
            - string
            - 'null'
          format: date-time
        sent_at:
          type:
            - string
            - 'null'
          format: date-time
        suggested_priority:
          type:
            - integer
            - 'null'
        priority_emoji:
          type:
            - string
            - 'null'
    SummaryNotice:
      type: object
      required:
        - code
        - message
        - severity
        - evidence_source
      properties:
        code:
          type: string
          enum:
            - sparse_tasks
            - missing_history
            - degraded_ranking
            - urgent_mode_active
            - delivery_context
        message:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
        evidence_source:
          type: string
          enum:
            - tasks
            - processed_history
            - state
            - system
    BriefingPriorityItem:
      type: object
      required:
        - task_id
        - title
        - rationale_text
      properties:
        task_id:
          type: string
        title:
          type: string
        project_name:
          type:
            - string
            - 'null'
        due_date:
          type:
            - string
            - 'null'
        priority_label:
          type:
            - string
            - 'null'
        rationale_text:
          type: string
    BriefingSummary:
      type: object
      required:
        - focus
        - priorities
        - why_now
        - start_now
        - notices
      properties:
        focus:
          type: string
        priorities:
          type: array
          items:
            $ref: '#/components/schemas/BriefingPriorityItem'
        why_now:
          type: array
          items:
            type: string
        start_now:
          type: string
        notices:
          type: array
          items:
            $ref: '#/components/schemas/SummaryNotice'
    WeeklyCarryForwardItem:
      type: object
      required:
        - title
        - reason
      properties:
        task_id:
          type:
            - string
            - 'null'
        title:
          type: string
        reason:
          type: string
    WeeklyWatchout:
      type: object
      required:
        - label
        - evidence
        - evidence_source
      properties:
        label:
          type: string
        evidence:
          type: string
        evidence_source:
          type: string
          enum:
            - current_tasks
            - processed_history
            - missing_data
    WeeklySummary:
      type: object
      required:
        - progress
        - carry_forward
        - next_focus
        - watchouts
        - notices
      properties:
        progress:
          type: array
          items:
            type: string
        carry_forward:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyCarryForwardItem'
        next_focus:
          type: array
          items:
            type: string
        watchouts:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyWatchout'
        notices:
          type: array
          items:
            $ref: '#/components/schemas/SummaryNotice'
    SummaryDiagnostics:
      type: object
      required:
        - source_counts
        - degraded
        - tone_preserved
        - telegram_safe
      properties:
        source_counts:
          type: object
          required:
            - active_tasks
            - processed_history
          properties:
            active_tasks:
              type: integer
              minimum: 0
            processed_history:
              type: integer
              minimum: 0
        degraded:
          type: boolean
        degraded_reason:
          type:
            - string
            - 'null'
        tone_preserved:
          type: boolean
        telegram_safe:
          type: boolean
    BriefingComposeRequest:
      type: object
      required:
        - context
        - active_tasks
      properties:
        context:
          $ref: '#/components/schemas/SummaryRequestContext'
        active_tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskInput'
    BriefingComposeResponse:
      type: object
      required:
        - summary
        - formatted_text
        - diagnostics
      properties:
        summary:
          $ref: '#/components/schemas/BriefingSummary'
        formatted_text:
          type: string
        diagnostics:
          $ref: '#/components/schemas/SummaryDiagnostics'
    WeeklyComposeRequest:
      type: object
      required:
        - context
        - active_tasks
        - processed_history
        - history_available
      properties:
        context:
          $ref: '#/components/schemas/SummaryRequestContext'
        active_tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskInput'
        processed_history:
          type: array
          items:
            $ref: '#/components/schemas/ProcessedHistoryEntry'
        history_available:
          type: boolean
    WeeklyComposeResponse:
      type: object
      required:
        - summary
        - formatted_text
        - diagnostics
      properties:
        summary:
          $ref: '#/components/schemas/WeeklySummary'
        formatted_text:
          type: string
        diagnostics:
          $ref: '#/components/schemas/SummaryDiagnostics'
    DailyCloseSummary:
      type: object
      required:
        - stats
        - reflection
        - reset_cue
        - notices
      properties:
        stats:
          type: array
          items:
            type: string
        reflection:
          type: string
        reset_cue:
          type: string
        notices:
          type: array
          items:
            $ref: '#/components/schemas/SummaryNotice'
    DailyCloseComposeRequest:
      type: object
      required:
        - context
        - active_tasks
        - processed_history
      properties:
        context:
          $ref: '#/components/schemas/SummaryRequestContext'
        active_tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskInput'
        processed_history:
          type: array
          items:
            $ref: '#/components/schemas/ProcessedHistoryEntry'
    DailyCloseComposeResponse:
      type: object
      required:
        - summary
        - formatted_text
        - diagnostics
      properties:
        summary:
          $ref: '#/components/schemas/DailyCloseSummary'
        formatted_text:
          type: string
        diagnostics:
          $ref: '#/components/schemas/SummaryDiagnostics'
