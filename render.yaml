# Render Blueprint — TickTick AI Accountability Partner
# Deploy: connect your GitHub repo on render.com, this file auto-configures everything.

services:
  - type: web
    name: ticktick-gemini-bot
    runtime: docker
    plan: free    # Change to 'starter' ($7/mo) for always-on without pinger
    # Pre-deploy quality gate: duplicate code detection runs in Dockerfile
    # Build stage includes: npm install && npm run check:duplicates
    healthCheckPath: /health
    envVars:
      # Required — TickTick OAuth credentials
      - key: TICKTICK_CLIENT_ID
        sync: false
      - key: TICKTICK_CLIENT_SECRET
        sync: false
      - key: TICKTICK_REDIRECT_URI
        sync: false
      # Optional — TickTick OAuth tokens (can also be bootstrapped via / OAuth flow)
      - key: TICKTICK_ACCESS_TOKEN
        sync: false
        required: false
      - key: TICKTICK_REFRESH_TOKEN
        sync: false
        required: false
      # Required — Telegram credentials
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # Required — Gemini API keys (comma-separated for key rotation)
      - key: GEMINI_API_KEYS
        sync: false
      # Optional — Gemini API key (singular, legacy fallback used only if GEMINI_API_KEYS is not set)
      - key: GEMINI_API_KEY
        sync: false
        required: false
      # Required for webhook mode — secret token for webhook signature verification
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
        required: false
      # Optional — Redis for persistent storage (required on Render due to ephemeral filesystem)
      - key: REDIS_URL
        sync: false
      # Optional — Plain-text Gemini-only context fallback.
      # Preferred for full config: Render Secret File named user_context.js mounted at /etc/secrets/user_context.js
      - key: USER_CONTEXT
        sync: false
      # Bot mode: 'webhook' for Render deployment
      - key: BOT_MODE
        value: webhook
      # Required for webhook mode — your Render service URL (set to https://<your-service>.onrender.com)
      - key: WEBHOOK_URL
        sync: false
      # Optional — timezone for scheduling (default: Europe/Dublin)
      - key: USER_TIMEZONE
        value: Europe/Dublin
      # Optional — auto-apply behavior (defaults shown)
      - key: AUTO_APPLY_LIFE_ADMIN
        value: "false"
      - key: AUTO_APPLY_MODE
        value: metadata-only
      # Optional — auto-write strategic priority
      - key: AUTO_APPLY_STRATEGIC_PRIORITY
        value: "true"
      # Optional — diagnostic receipt details stay disabled in production/user-facing flows
      - key: DEBUG_RECEIPTS
        value: "false"
      # Optional — Render uses port 10000 by default
      - key: PORT
        value: "10000"
      # Optional — scheduler config (defaults shown)
      - key: DAILY_BRIEFING_HOUR
        value: "8"
      - key: WEEKLY_DIGEST_DAY
        value: "0"
      - key: POLL_INTERVAL_MINUTES
        value: "5"
      # Optional — behavioral memory retention windows
      - key: BEHAVIORAL_SIGNAL_RETENTION_DAYS
        value: "30"
      - key: BEHAVIORAL_SIGNAL_ARCHIVE_DAYS
        value: "90"
      # Optional — pipeline transient retry tuning
      - key: PIPELINE_TRANSIENT_MAX_RETRIES
        value: "1"
      - key: PIPELINE_TRANSIENT_BASE_DELAY_MS
        value: "250"
      - key: PIPELINE_TRANSIENT_MAX_DELAY_MS
        value: "4000"
      # Optional — TickTick rate-limit retry tuning
      - key: TICKTICK_RATE_LIMIT_MAX_RETRIES
        value: "3"
      - key: TICKTICK_RATE_LIMIT_BASE_DELAY_MS
        value: "1000"
      - key: TICKTICK_RATE_LIMIT_MAX_DELAY_MS
        value: "30000"
