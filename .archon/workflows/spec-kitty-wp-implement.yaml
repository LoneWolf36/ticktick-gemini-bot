name: spec-kitty-wp-implement
description: |
  Use when: Implementing a single Spec Kitty work package from a generated
  implementation prompt inside the Spec Kitty worktree.

  Input format:
    <absolute prompt path>

  This workflow intentionally uses --no-worktree with --cwd set to the
  Spec Kitty-created workspace. Spec Kitty owns WP state, dependencies,
  and worktree lifecycle. Archon owns the Qwen execution wrapper only.

provider: qwen
model: coder-model

nodes:
  - id: implement-wp
    idle_timeout: 1200000
    prompt: |
      You are Qwen Coder running through Archon for a Spec Kitty work package.

      The single source of truth is the implementation prompt at:
      $ARGUMENTS

      Mandatory workflow:
      1. Read the full prompt at $ARGUMENTS before editing anything.
      2. Work only in the current repository checkout; this should be the
         Spec Kitty worktree passed to Archon via --cwd.
      3. Preserve Spec Kitty frontmatter and event-sourced status conventions.
      4. Implement the WP exactly as specified, including the Product Vision
         Alignment Gate and Implement-Review No-Drift Contract.
      5. Do not add SaaS scope, auth, billing, multi-tenant isolation, generic
         reminder behavior, or passive task-manager behavior unless the prompt
         explicitly requires it.
      6. Add or update tests required by the WP prompt.
      7. Run the validation commands specified in the prompt. If the prompt is
         silent, run the repository regression command that applies to the
         files you changed, and prefer `node --test tests/regression.test.js`
         for shared behavior.
      8. Verify new code is called from the live entry point, not only tested
         in isolation.
      9. Commit the implementation in the worktree with a focused conventional
         commit.
      10. Move the WP to for_review using the exact Spec Kitty command shown
          in the prompt or the canonical equivalent:
          `spec-kitty agent tasks move-task WP## --to for_review --note
          "Ready for review: <summary>"`

      Required final response:
      - WP id
      - Files changed
      - Tests run and exact result
      - Product Vision impact statement
      - Confirmation that the WP was moved to for_review, or the exact blocker
        if that could not be done
