name: spec-kitty-wp-implement
description: |
  Use when: Implementing a single Spec Kitty work package from a generated
  implementation prompt inside the Spec Kitty-created worktree.

  Input format:
    <absolute prompt path>

  Spec Kitty owns WP state, dependencies, worktree lifecycle, review state,
  and merge state. Archon owns only Codex routing and quality discipline.

provider: codex
model: gpt-5.4-mini

nodes:
  - id: implement-wp
    timeout: 7200000
    context: fresh
    prompt: |
      You are Codex running through Archon for a Spec Kitty work package.

      The single source of truth is the implementation prompt at:
      $ARGUMENTS

      Mandatory workflow:
      1. Read the full prompt at `$ARGUMENTS` before editing anything.
      2. Work only in the current repository checkout; this should be the
         Spec Kitty-created worktree passed to Archon via --cwd.
      3. Preserve Spec Kitty frontmatter and event-sourced state conventions.
      4. Do not edit `status.events.jsonl`; use the exact Spec Kitty command
         from the prompt for state transitions.
      5. Implement the WP exactly as specified, including Product Vision
         alignment and no-drift requirements.
      6. Do not add SaaS scope, auth, billing, multi-tenant isolation, generic
         reminder behavior, or passive task-manager behavior unless the prompt
         explicitly requires it.
      7. Add or update tests required by the WP prompt.
      8. Run the validation commands specified in the prompt. If the prompt is
         silent, run the repository regression command that applies to the
         files changed.
      9. Verify new code is called from the live entry point, not only tested
         in isolation.
      10. Commit the implementation in the worktree with a focused conventional
          commit.
      11. Move the WP to for_review using the exact Spec Kitty command shown
          in the prompt or the canonical equivalent for Spec Kitty v3.1.4.

      Required final response:
      - WP id
      - Files changed
      - Tests run and exact result
      - Product Vision impact statement
      - Confirmation that the WP was moved to for_review, or the exact blocker
        if that could not be done
