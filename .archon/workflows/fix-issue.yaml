name: fix-issue
description: |
  Use when: User wants to FIX, RESOLVE, or IMPLEMENT a solution for a GitHub issue
  in the TickTick + Gemini bot project.
  Triggers: "fix this issue", "implement issue #123", "resolve this bug", "fix it",
            "fix issue", "resolve issue", "fix #123".
  NOT for: Comprehensive multi-agent reviews, questions about issues, CI failures,
           PR reviews, general exploration.

  DAG workflow that:
  1. Fetches and classifies the GitHub issue
  2. Investigates the codebase (bugs) or creates a plan (features)
  3. Implements the fix/feature with validation
  4. Creates a draft PR
  5. Reviews the changes
  6. Self-fixes any findings
  7. Reports results

provider: qwen
model: coder-model

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: FETCH & CLASSIFY
  # ═══════════════════════════════════════════════════════════════

  - id: extract-issue-number
    prompt: |
      Find the GitHub issue number for this request.

      Request: $ARGUMENTS

      Rules:
      - If the message contains an explicit issue number (e.g., "#42", "issue 42"), extract that number.
      - If the message is ambiguous, use `gh issue list` to search for matching issues and pick the best match.

      CRITICAL: Your final output must be ONLY the bare number with no quotes, no markdown, no explanation. Example correct output: 42

  - id: fetch-issue
    bash: |
      ISSUE_NUM=$(echo "$extract-issue-number.output" | tr -d "'\"\`\n " | grep -oE '[0-9]+' | head -1)
      if [ -z "$ISSUE_NUM" ]; then
        echo "Failed to extract issue number from: $extract-issue-number.output" >&2
        exit 1
      fi
      gh issue view "$ISSUE_NUM" --json title,body,labels,comments,state,url,author
    depends_on: [extract-issue-number]

  - id: classify
    prompt: |
      You are an issue classifier. Analyze the GitHub issue below and determine its type.

      ## Issue Content
      $fetch-issue.output

      ## Classification Rules

      | Type | Indicators |
      |------|------------|
      | bug | "broken", "error", "crash", "doesn't work", stack traces, regression |
      | feature | "add", "new", "support", "would be nice", net-new capability |
      | enhancement | "improve", "better", "update existing", "extend", incremental improvement |
      | refactor | "clean up", "simplify", "reorganize", "restructure" |
      | chore | "update deps", "upgrade", "maintenance", "CI/CD" |
      | documentation | "docs", "readme", "clarify", "examples" |

      Provide reasoning for your classification.
    depends_on: [fetch-issue]
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: ["bug", "feature", "enhancement", "refactor", "chore", "documentation"]
        title:
          type: string
        reasoning:
          type: string
      required: [issue_type, title, reasoning]

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: INVESTIGATE (bugs) / PLAN (features)
  # ═══════════════════════════════════════════════════════════════

  - id: investigate
    prompt: |
      You are investigating a bug in the TickTick + Gemini bot project.

      ## Issue
      $fetch-issue.output

      ## Investigation Steps
      1. Read the issue details above
      2. Explore the codebase to understand relevant components:
         - Bot logic: `bot/`, `src/`
         - Services: `services/`
         - Tests: `tests/`
      3. Identify the root cause and affected files
      4. Write a detailed investigation report to $ARTIFACTS_DIR/investigation.md

      ## Project Conventions
      - Node.js server, see AGENTS.md for conventions
      - Commits must include: Co-Authored-By: Codex GPT-5 <noreply@openai.com>

      Write the investigation report with:
      - Root cause analysis
      - Files to modify (with line numbers)
      - Step-by-step fix plan
      - Validation commands to run after the fix
    depends_on: [classify]
    when: "$classify.output.issue_type == 'bug'"
    context: fresh

  - id: create-plan
    prompt: |
      You are creating an implementation plan for a feature/enhancement in the TickTick + Gemini bot project.

      ## Issue
      $fetch-issue.output

      ## Planning Steps
      1. Read the issue details above
      2. Explore the codebase to understand relevant components:
         - Bot logic: `bot/`, `src/`
         - Services: `services/`
         - Tests: `tests/`
      3. Create a detailed implementation plan with discrete tasks
      4. Write the plan to $ARTIFACTS_DIR/plan.md

      ## Project Conventions
      - Node.js server, see AGENTS.md for conventions
      - Commits must include: Co-Authored-By: Codex GPT-5 <noreply@openai.com>

      Write the plan with:
      - Overview and goals
      - Ordered list of tasks (each with target files and description)
      - Validation commands to run after implementation
    depends_on: [classify]
    when: "$classify.output.issue_type != 'bug'"
    context: fresh

  # Bridge: ensure investigation.md exists for the implement step
  - id: bridge-artifacts
    bash: |
      if [ -f "$ARTIFACTS_DIR/plan.md" ] && [ ! -f "$ARTIFACTS_DIR/investigation.md" ]; then
        cp "$ARTIFACTS_DIR/plan.md" "$ARTIFACTS_DIR/investigation.md"
        echo "Bridged plan.md to investigation.md for implement step"
      elif [ -f "$ARTIFACTS_DIR/investigation.md" ]; then
        echo "investigation.md exists from investigate step"
      else
        echo "WARNING: No investigation.md or plan.md found — implement may fail"
      fi
    depends_on: [investigate, create-plan]
    trigger_rule: one_success

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════

  - id: implement
    command: fix-issue
    depends_on: [bridge-artifacts]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════

  - id: validate
    command: validate
    depends_on: [implement]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 5: CREATE DRAFT PR
  # ═══════════════════════════════════════════════════════════════

  - id: create-pr
    prompt: |
      Create a draft pull request for the current branch.

      ## Context
      - **Issue**: $ARGUMENTS
      - **Classification**: $classify.output
      - **Issue title**: $classify.output.title

      ## Instructions
      1. Check git status — ensure all changes are committed. If uncommitted changes exist, stage and commit them.
         IMPORTANT: Include the required co-author line in every commit:
         Co-Authored-By: Codex GPT-5 <noreply@openai.com>
      2. Push the branch: `git push -u origin HEAD`
      3. Read implementation artifacts from `$ARTIFACTS_DIR/` for context:
         - `$ARTIFACTS_DIR/investigation.md` or `$ARTIFACTS_DIR/plan.md`
         - `$ARTIFACTS_DIR/implementation.md`
         - `$ARTIFACTS_DIR/validation.md`
      4. Check if a PR already exists for this branch: `gh pr list --head $(git branch --show-current)`
         - If PR exists, skip creation and capture its number
      5. Look for the project's PR template at `.github/pull_request_template.md` or `.github/PULL_REQUEST_TEMPLATE.md`
         - If found, read and follow it
      6. Create a DRAFT PR: `gh pr create --draft --base $BASE_BRANCH`
         - Title: concise, imperative mood, under 70 chars
         - Body: fill in every section with details from the artifacts
         - Link to issue: include `Fixes #...` or `Closes #...`
      7. Capture PR identifiers:
         ```bash
         PR_NUMBER=$(gh pr view --json number -q '.number')
         echo "$PR_NUMBER" > "$ARTIFACTS_DIR/.pr-number"
         PR_URL=$(gh pr view --json url -q '.url')
         echo "$PR_URL" > "$ARTIFACTS_DIR/.pr-url"
         ```
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 6: REVIEW & SELF-FIX
  # ═══════════════════════════════════════════════════════════════

  - id: review
    prompt: |
      Review the PR changes against the project standards.

      ## Review Checklist
      1. Read the PR diff: `gh pr diff`
      2. Check against project conventions (see AGENTS.md):
         - Node.js code quality and consistency
         - Error handling
         - Test coverage
         - Type safety (if applicable)
         - Security concerns (no exposed API keys, proper secret handling)
         - Commits include Co-Authored-By line
      3. Check for:
         - Code quality and consistency
         - Error handling
         - Test coverage
         - Security concerns
      4. Write findings to $ARTIFACTS_DIR/review.md
    depends_on: [create-pr]
    context: fresh

  - id: self-fix
    prompt: |
      Address all findings from the review.

      ## Steps
      1. Read the review at $ARTIFACTS_DIR/review.md
      2. Fix each issue identified in the review
      3. Run validation again (see validate command)
      4. Commit fixes with the required Co-Authored-By line
      5. Push the fixes
      6. Write a fix summary to $ARTIFACTS_DIR/self-fix.md
    depends_on: [review]
    context: fresh

  # ═══════════════════════════════════════════════════════════════
  # PHASE 7: REPORT
  # ═══════════════════════════════════════════════════════════════

  - id: report
    prompt: |
      Generate a completion report and post it as a comment on the GitHub issue.

      ## Steps
      1. Gather all artifacts: investigation.md, implementation.md, validation.md, review.md
      2. Read the PR URL from $ARTIFACTS_DIR/.pr-url
      3. Read the issue URL from the fetch step
      4. Post a comment on the original issue summarizing:
         - What was done
         - Files changed
         - Validation results
         - Link to the PR
      5. Write a final summary to $ARTIFACTS_DIR/report.md

      ## Report Format
      ```markdown
      ## Implementation Complete

      **Issue**: {title}
      **PR**: {pr_url}

      ### Changes
      | File | Description |
      |------|-------------|
      | ... | ... |

      ### Validation
      | Check | Result |
      |-------|--------|
      | Lint | Pass/Fail |
      | Tests | Pass/Fail |
      | Type Check | Pass/Fail |
      ```
    depends_on: [self-fix]
    context: fresh
