name: spec-kitty-wp-review
description: |
  Use when: Reviewing a single Spec Kitty work package from a generated review
  prompt inside the Spec Kitty worktree.

  Input format:
    <absolute review prompt path>

  This workflow is review-only. It does not implement fixes. Its job is to
  produce an evidence-backed verdict against the Product Vision, the mission
  contracts, and the generated Spec Kitty review prompt.

nodes:
  - id: preflight
    bash: |
      set -euo pipefail

      prompt_path="$ARGUMENTS"
      if [ ! -f "$prompt_path" ]; then
          echo "Spec Kitty review prompt not found: $prompt_path" >&2
          exit 1
      fi

      cp "$prompt_path" "$ARTIFACTS_DIR/wp-review-prompt.md"
      {
          echo "prompt_path=$prompt_path"
          echo "product_vision=$(pwd)/Product Vision and Behavioural Scope.md"
          echo "repo_root=$(pwd)"
          echo "branch=$(git branch --show-current)"
          echo "head=$(git rev-parse --short HEAD)"
      } > "$ARTIFACTS_DIR/preflight.txt"

      echo "Review preflight complete"

  - id: run-review
    depends_on: [preflight]
    timeout: 7200000
    bash: |
      set -euo pipefail

      qwen_prompt="$ARTIFACTS_DIR/qwen-spec-kitty-review.md"
      cat > "$qwen_prompt" <<'EOF'
      You are Qwen Coder running through Archon as a strict reviewer for a
      Spec Kitty work package.

      The single source of truth is the review prompt at:
      __SPEC_KITTY_REVIEW_PROMPT_PATH__

      Mandatory workflow:
      1. Read __SPEC_KITTY_REVIEW_PROMPT_PATH__ in full.
      2. Read Product Vision and Behavioural Scope.md in full.
      3. Audit the actual implementation, tests, and wiring against:
         - the review prompt
         - the mission spec / plan / tasks
         - the Product Vision Alignment Gate
         - the Implement-Review No-Drift Contract
      4. Be strict about behavioral drift. Reject work that behaves like a
         passive task manager, creates busywork, adds cognitive load, or hides
         uncertainty behind confident writes.
      5. Do not edit repository files. This workflow is review-only.
      6. Write __ARTIFACTS_DIR__/review-report.md with:
         - verdict: APPROVE or REJECT
         - highest-severity findings first
         - exact file references
         - missing tests or missing evidence
         - whether the WP should remain done, move back to for_review, or be reopened
         - a short product-vision fidelity assessment
      7. Write __ARTIFACTS_DIR__/review-report.json with keys:
         verdict, reopen_wp, findings, evidence_gaps, recommended_next_step

      Your final terminal response must match review-report.md.
      EOF
      sed -i "s|__SPEC_KITTY_REVIEW_PROMPT_PATH__|$ARTIFACTS_DIR/wp-review-prompt.md|g" "$qwen_prompt"
      sed -i "s|__ARTIFACTS_DIR__|$ARTIFACTS_DIR|g" "$qwen_prompt"

      qwen -y -m coder-model -p "$(cat "$qwen_prompt")" | tee "$ARTIFACTS_DIR/qwen-review.stdout"

  - id: postflight
    depends_on: [run-review]
    bash: |
      set -euo pipefail

      if [ ! -f "$ARTIFACTS_DIR/review-report.md" ]; then
          echo "Missing review report: $ARTIFACTS_DIR/review-report.md" >&2
          exit 1
      fi

      cat "$ARTIFACTS_DIR/review-report.md"
