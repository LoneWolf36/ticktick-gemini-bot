name: spec-kitty-complete-missions-001-to-009
description: |
  Use when: Completing all Spec Kitty missions (001-009) for the TickTick-Gemini 
  behavioral support system. Implements all work packages sequentially with 
  implementation, testing, review, and commit.
  
  This workflow:
  1. Reads mission status from kitty-specs/
  2. For each mission (001-009), identifies pending WPs
  3. Implements each WP sequentially following the spec-kitty-wp-implement pattern
  4. Reviews each implementation against Product Vision
  5. Commits changes with proper conventions
  6. Updates WP status in status.events.jsonl
  7. Reports final completion summary
  
  Input: "complete all missions" or "implement features 001-009"
  NOT for: Creating new specs, planning features (specs must already exist).

provider: qwen
model: coder-model

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 0: DISCOVERY & STATUS ANALYSIS
  # ═══════════════════════════════════════════════════════════════

  - id: analyze-mission-status
    bash: |
      set -euo pipefail

      echo "=== Analyzing Mission Status ==="

      MISSIONS=("001-task-operations-pipeline" \
                "002-natural-language-task-mutations" \
                "003-pipeline-hardening-and-regression" \
                "004-post-migration-cleanup" \
                "005-checklist-subtask-support" \
                "006-briefing-weekly-modernization" \
                "007-execution-prioritization-foundations" \
                "008-work-style-and-urgent-mode" \
                "009-behavioral-signals-and-memory")

      TOTAL_WP=0
      DONE_WP=0

      for mission in "${MISSIONS[@]}"; do
        STATUS_FILE="kitty-specs/${mission}/status.events.jsonl"
        
        if [ -f "$STATUS_FILE" ]; then
          MISSION_WPS=$(grep -oP '"wp_id":"WP\d+"' "$STATUS_FILE" | sort -u | wc -l)
          MISSION_DONE=$(grep '"to_lane":"done"' "$STATUS_FILE" | grep -oP '"wp_id":"WP\d+"' | sort -u | wc -l)
          TOTAL_WP=$((TOTAL_WP + MISSION_WPS))
          DONE_WP=$((DONE_WP + MISSION_DONE))
          echo "${mission}: ${MISSION_DONE}/${MISSION_WPS} WPs done"
        fi
      done

      echo ""
      echo "Total: ${DONE_WP}/${TOTAL_WP} WPs complete"
      echo "Remaining: $((TOTAL_WP - DONE_WP)) WPs"

  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: IMPLEMENT MISSION 002 (WP02-WP07, WP01 already done)
  # ═══════════════════════════════════════════════════════════════

  - id: implement-002-wp02
    depends_on: [analyze-mission-status]
    timeout: 7200000
    bash: |
      set -euo pipefail

      WP_ID="WP02"
      MISSION="002-natural-language-task-mutations"
      WP_FILE="kitty-specs/${MISSION}/tasks/WP02-ax-mutation-intent.md"

      echo "=== Implementing ${MISSION}: ${WP_ID} ==="

      if [ ! -f "$WP_FILE" ]; then
        echo "ERROR: WP file not found: $WP_FILE"
        exit 1
      fi

      # Read the WP spec
      echo "Reading WP specification..."
      cat "$WP_FILE"

      echo ""
      echo "═══════════════════════════════════════════════════════"
      echo "IMPLEMENTATION INSTRUCTIONS FOR ${WP_ID}"
      echo "═══════════════════════════════════════════════════════"
      echo ""
      echo "Please implement this work package following these steps:"
      echo "1. Read the full WP specification above"
      echo "2. Understand the Product Vision Alignment Gate requirements"
      echo "3. Implement the code changes specified in the subtasks"
      echo "4. Write or update tests as required"
      echo "5. Run tests: node --test tests/*.test.js"
      echo "6. Run regression: node tests/run-regression-tests.mjs"
      echo "7. Commit changes with conventional commit message"
      echo "8. Include Co-Authored-By: Codex GPT-5 <noreply@openai.com>"
      echo ""
      echo "CRITICAL: This is an AI-assisted implementation session."
      echo "You should now write the implementation code based on the spec."

      # This node serves as a checkpoint - the actual implementation
      # happens in the interactive session where this workflow runs

  - id: implement-002-wp03
    depends_on: [implement-002-wp02]
    timeout: 7200000
    bash: |
      set -euo pipefail

      WP_ID="WP03"
      MISSION="002-natural-language-task-mutations"
      WP_FILE="kitty-specs/${MISSION}/tasks/WP03-mutation-normalizer.md"

      echo "=== Implementing ${MISSION}: ${WP_ID} ==="
      echo "Reading WP specification: $WP_FILE"
      [ -f "$WP_FILE" ] && cat "$WP_FILE" || echo "ERROR: File not found"

  - id: implement-002-wp04
    depends_on: [implement-002-wp03]
    timeout: 7200000
