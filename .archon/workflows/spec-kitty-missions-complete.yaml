name: spec-kitty-missions-complete
description: |
  Use when: Executing ALL Spec Kitty missions (001-009) for the TickTick-Gemini 
  behavioral support system with strict quality gates and multi-agent review.

  This workflow implements a dependency-first execution order:
  - Phase 1: Feature 002 (NLP mutations) — foundation for all mutations
  - Phase 2: Feature 003 (Pipeline hardening) — depends on 002 stability
  - Phase 3: Feature 004 (Post-migration cleanup) — depends on 002+003
  - Phase 4: Feature 005 (Checklist subtask support) — depends on 002 pipeline
  - Phase 5: Features 006 + 008 (Quick wins) — briefing modernization + urgent mode
  - Phase 6: Feature 009 (Behavioral signals) — core product value, depends on all above

  For EACH work package:
  1. Read the WP spec from kitty-specs/{mission}/tasks/WP{NN}-*.md
  2. Implement with strict adherence to Product Vision Alignment Gate
  3. Run validation (tests, lint, regression)
  4. Multi-agent review (5 parallel agents):
     - Architecture review (YAGNI, DRY, no overengineering)
     - Security review (no secrets, input validation, auth patterns)
     - Test coverage review (edge cases, behavioral contracts, regression)
     - Product Vision alignment (behavioral support system, not task manager)
     - Code quality (clean code, naming, structure, comments)
  5. Synthesize review findings
  6. Auto-fix review issues
  7. Re-validate
  8. Commit with conventional commit message
  9. Update WP status in status.events.jsonl

  Quality bar: MAXIMUM
  - All tests pass (unit + regression)
  - Lint clean with zero warnings
  - Product Vision alignment statement for every WP
  - No drift from accepted architecture
  - Explicit acceptance criteria verification per WP
  - Security audit passes
  - No code duplication beyond baseline

  Input: "complete all spec-kitty missions" or "implement features 001-009"
  NOT for: Creating new specs, planning features (specs must already exist).

provider: qwen
model: coder-model

