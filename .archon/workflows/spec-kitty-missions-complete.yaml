name: spec-kitty-missions-complete
description: |
  Use when: Executing ALL Spec Kitty missions (002-009) for the TickTick-Gemini
  behavioral support system with strict quality gates and multi-agent review.
  Note: Mission 001 (task operations pipeline) was completed prior to this workflow.

  This workflow implements a dependency-first execution order:
  - Phase 1: Feature 002 (NLP mutations) — foundation for all mutations
  - Phase 2: Feature 003 (Pipeline hardening) — depends on 002 stability
  - Phase 3: Feature 004 (Post-migration cleanup) — depends on 002+003
  - Phase 4: Feature 005 (Checklist subtask support) — depends on 002 pipeline
  - Phase 5: Features 006 + 008 (Quick wins) — briefing modernization + urgent mode
  - Phase 6: Feature 009 (Behavioral signals) — core product value, depends on all above

  For EACH work package:
  1. Read the WP spec from kitty-specs/{mission}/tasks/WP{NN}-*.md
  2. Implement with strict adherence to Product Vision Alignment Gate
  3. Run validation (tests, lint, regression)
  4. Save per-WP checkpoint (granular recovery point)
  5. Multi-agent review (5 parallel agents):
     - Architecture review (YAGNI, DRY, no overengineering)
     - Security review (no secrets, input validation, auth patterns)
     - Test coverage review (edge cases, behavioral contracts, regression)
     - Product Vision alignment (behavioral support system, not task manager)
     - Code quality (clean code, naming, structure, comments)
  6. Synthesize review findings
  7. Save review checkpoint
  8. Auto-fix review issues
  9. Save fix checkpoint
  10. Re-validate
  11. Commit with conventional commit message
  12. Update WP status in status.events.jsonl

  Quality bar: MAXIMUM
  - All tests pass (unit + regression)
  - Lint clean with zero warnings
  - Product Vision alignment statement for every WP
  - No drift from accepted architecture
  - Explicit acceptance criteria verification per WP
  - Security audit passes
  - No code duplication beyond baseline

  Input: "complete all spec-kitty missions" or "implement features 001-009"
  NOT for: Creating new specs, planning features (specs must already exist).

provider: qwen
model: coder-model

# ═══════════════════════════════════════════════════════════════════
# RECOVERY CONFIGURATION — Granular Checkpoint Strategy
# ═══════════════════════════════════════════════════════════════════
recovery:
  strategy: resume_from_last_checkpoint
  checkpoint_interval: per_wp
  max_recovery_attempts: 2
  on_resume: validate_git_state_before_continuing

# ═══════════════════════════════════════════════════════════════════
# SHARED REVIEW CONFIGURATION
# ═══════════════════════════════════════════════════════════════════

# Review agents run in parallel after each feature phase
# trigger_rule: all_done = wait for all reviews to complete before synthesis
# context: fresh = each agent gets clean context, no prior conversation noise

# ═══════════════════════════════════════════════════════════════════
# PHASE 1: FEATURE 002 — Natural Language Task Mutations
# Mission: Enable update/complete/delete via natural language
# WPs: WP01(done), WP02-WP07 (6 WPs remaining)
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# PHASE 0: TECHNICAL DEBT ELIMINATION
# Mission: Catalog and fix pre-existing test failures before feature work
# This ensures a clean baseline — zero tolerance for new failures
# ═══════════════════════════════════════════════════════════════════

nodes:
  - id: debt-catalog
    command: spec-kitty-track-failures
    context: fresh
    args: "technical-debt-baseline"

  - id: debt-fix-low
    command: spec-kitty-fix-failures
    depends_on: [debt-catalog]
    context: fresh
    args: "technical-debt-baseline low"

  - id: debt-verify
    command: spec-kitty-validate-full
    depends_on: [debt-fix-low]
    context: fresh

  - id: debt-checkpoint
    command: spec-kitty-checkpoint-save
    depends_on: [debt-verify]
    context: fresh
    args: "technical-debt phase-complete"

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: FEATURE 002 — Natural Language Task Mutations
  # Mission: Enable update/complete/delete via natural language
