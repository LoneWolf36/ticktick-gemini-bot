name: cavekit-validate
description: |
  Use when: You want to run a comprehensive gap analysis against all domain kits.
  Input: Optional kit name to focus on (default: all kits)
  Output: Gap analysis report showing which requirements are done, pending, and blocked

  Read-only analysis of source code — no source files are modified.
  Writing the gap-analysis report to `$ARTIFACTS_DIR/gap-analysis.md` is expected and allowed.
  Do NOT modify any files under the project source tree.
  Equivalent to /ck:check but with Archon's structured output.

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: SCAN — Read all kits and build status matrix
  # ═══════════════════════════════════════════════════════════════

  - id: scan-kits
    context: fresh
    prompt: |
      # Cavekit Validate — Scan Domain Kits

      **CONSTRAINT: Do NOT modify any source code files. Writing the report to `$ARTIFACTS_DIR/gap-analysis.md` IS expected and allowed.**

      **Focus**: $ARGUMENTS (empty = all kits)

      ---

      ## Step 0: Locate the Kits Directory

      The Archon worktree may not contain `context/kits/`. Find the kits:

      ```bash
      # Try worktree first, then main checkout, then search
      if [ -d context/kits ]; then
        KITS_DIR="context/kits"
      else
        # Archon worktrees are typically inside .archon/worktrees/ under the main repo
        REPO_ROOT=$(git rev-parse --show-toplevel 2>/dev/null)
        if [ -d "$REPO_ROOT/context/kits" ]; then
          KITS_DIR="$REPO_ROOT/context/kits"
        else
          # Walk up from cwd to find context/kits
          KITS_DIR=""
          dir="$(pwd)"
          for i in $(seq 1 5); do
            if [ -d "$dir/context/kits" ]; then
              KITS_DIR="$dir/context/kits"
              break
            fi
            dir="$(dirname "$dir")"
          done
        fi
      fi

      if [ -z "$KITS_DIR" ] || [ ! -f "$KITS_DIR/cavekit-overview.md" ]; then
        echo "ERROR: Could not locate context/kits/ directory. Aborting." >&2
        exit 1
      fi
      echo "KITS_DIR=$KITS_DIR"
      ```

      Use `$KITS_DIR` for all subsequent kit file paths.

      ## Step 0.5: Bootstrap a Cold Worktree Before Runtime Validation

      If this Archon worktree does not have dependencies installed yet, bootstrap it before you run any repo tests or runtime checks:

      ```bash
      if [ -f package-lock.json ] && [ ! -d node_modules ]; then
        npm ci
      elif [ -f package.json ] && [ ! -d node_modules ]; then
        npm install
      fi
      ```

      Do this once near the start of the run so missing `node_modules` does not create false-negative validation failures.

      ## Step 1: Read Overview

      ```bash
      cat "$KITS_DIR/cavekit-overview.md"
      ```

      ## Step 2: Scan Each Kit

      For each kit file in `$KITS_DIR/cavekit-*.md`:

      ```bash
      ls "$KITS_DIR"/cavekit-*.md
      ```

      Read each kit and count:
      - Total R-requirements
      - Checked `[x]` requirements
      - Unchecked `[ ]` requirements
      - Requirements with unmet dependencies

      **Important counting rules:**
      - Count only true R-blocks that start with `### R<number>:`.
      - For each R-block, only checkbox lines between `**Acceptance Criteria:**` and `**Dependencies:**` determine done vs pending.
      - A requirement is **done** iff every acceptance-criteria checkbox in that R-block is checked.
      - Dependencies affect **blocked** status for pending requirements only; they never turn a fully checked requirement back into pending.
      - Ignore all checkboxes outside R-blocks, especially `## Validation Action Items`, changelog bullets, and migration notes.
      - Treat dependency ranges like `R1 through R12` as expanded references for blocked-status analysis.

      Prefer a deterministic parser over eyeballing. Use a small Python script or equivalent to enumerate each R-block and its acceptance checkboxes before writing the matrix.

      ## Step 3: Build Status Matrix

      Before writing the report, sanity-check the parser output against known kit files. For example, if `cavekit-work-style.md` has all acceptance criteria checked in every R-block, its `Done` count must equal 13.

      Write to `$ARTIFACTS_DIR/gap-analysis.md`:

      ```markdown
      # Cavekit Gap Analysis — $(date -I)

      ## Overall Progress

      | Kit | Total | Done | Pending | Blocked | Progress |
      |-----|-------|------|---------|---------|----------|
      | {kit} | {n} | {n} | {n} | {n} | {%}% |
      | **TOTAL** | {n} | {n} | {n} | {n} | {%}% |

      ## Next Actions (Priority Order)

      1. **{R-number}** ({kit}) — {title} — {complexity}
         - Why next: {dependency analysis}
      2. **{R-number}** ({kit}) — {title} — {complexity}
         - Why next: {dependency analysis}
      3. **{R-number}** ({kit}) — {title} — {complexity}
         - Why next: {dependency analysis}

      ## Blocked Requirements

      | Requirement | Kit | Blocked By | Status of Blocker |
      |------------|-----|------------|-------------------|
      | {R-number} | {kit} | {R-dep} | {done/pending} |

      ## Recommendations

      - {actionable insight}
      - {risk or concern}
      ```

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: VERIFY — Cross-reference implementation with specs
  # ═══════════════════════════════════════════════════════════════

  - id: verify-impl
    depends_on: [scan-kits]
    context: fresh
    prompt: |
      # Cavekit Validate — Verify Implementation

      **CONSTRAINT: Do NOT modify any source code files. Appending to `$ARTIFACTS_DIR/gap-analysis.md` IS expected and allowed.**

      Read `$ARTIFACTS_DIR/gap-analysis.md` for the status matrix.

      ---

      ## Step 1: Spot-Check Completed Requirements

      If you plan to run any repo tests in this node and `node_modules` is still missing, bootstrap first:

      ```bash
      if [ -f package-lock.json ] && [ ! -d node_modules ]; then
        npm ci
      elif [ -f package.json ] && [ ! -d node_modules ]; then
        npm install
      fi
      ```

      For each `[x]` requirement, do a quick grep to verify the implementation exists:

      ```bash
      # Example: if R03 says "Redis caching", verify redis is actually used
      grep -rn "{key term from AC}" --include="*.{js,ts,py}" --exclude-dir=node_modules | head -5
      ```

      ## Step 2: Check for Drift

      Look for code that doesn't map to any R-requirement:
      - New files not mentioned in any kit
      - Features that exist in code but not in specs
      - Distinguish **true drift** from **stale comments**. If code comments say a surface is unmapped but the current kits explicitly map it, report that as stale-comment drift rather than feature drift.
      - Distinguish **implemented but unchecked** requirements from truly unmapped features. If a feature is explicitly listed in an R-block and the code clearly satisfies it, that is a completion-state issue, not an unmapped drift item.

      ## Step 3: Append to Report

      Add a "Verification" section to `$ARTIFACTS_DIR/gap-analysis.md`:

      ```markdown
      ## Verification Spot-Check

      | Requirement | Claimed Status | Evidence Found | Verdict |
      |------------|---------------|----------------|---------|
      | {R-number} | [x] | {grep result} | CONFIRMED / SUSPECT |

      ## Potential Drift

      | File/Feature | Description | Mapped to Kit? |
      |-------------|-------------|---------------|
      | {file} | {what it does} | {R-number or UNMAPPED} |
      ```

      Present the final report to the user.
