      - name: Validate Timeout Values
        run: |
          echo "=== Validating Timeout Values ==="
          python3 << 'PYTHON'
import yaml, sys, glob, os

def validate_timeouts(workflow_file):
    with open(workflow_file) as f:
        data = yaml.safe_load(f)

    issues = []
    for node in data.get('nodes', []):
        timeout = node.get('timeout')
        if timeout is None:
            issues.append(f"Node '{node['id']}' has no timeout — will run forever if stuck")
        elif not isinstance(timeout, (int, float)):
            issues.append(f"Node '{node['id']}' timeout is not a number: {timeout}")
        elif timeout <= 0:
            issues.append(f"Node '{node['id']}' timeout is <= 0: {timeout}")
        elif timeout > 86400000:
            issues.append(f"Node '{node['id']}' timeout > 24h ({timeout}ms) — is this intentional?")

    if issues:
        print(f"WARNINGS in {workflow_file}:")
        for issue in issues:
            print(f"  - {issue}")
        return False
    else:
        node_count = len(data.get('nodes', []))
        print(f"OK: {workflow_file} — all {node_count} nodes have valid timeouts")
        return True

failed = False
for f in glob.glob('.archon/workflows/*.yaml'):
    if not os.path.isfile(f):
        continue
    try:
        if not validate_timeouts(f):
            failed = True
    except Exception as e:
        print(f"ERROR: Failed to validate {f}: {e}")
        failed = True

if failed:
    print("\n::warning::Some nodes have missing or invalid timeouts. Review and fix before deploying.")
